<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVN Web 浏览器</title>
    <!-- 引入自定义 Google 字体 (Inter) 和 Remix Icon 作为图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏/设置栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="ri-git-repository-line"></i> SVN Browser</h2>
                <p>轻量级 SVN 网页浏览工具</p>
            </div>

            <form id="svn-form" class="auth-form">
                <div class="form-group">
                    <label for="baseUrl">SVN 地址</label>
                    <div class="input-wrapper">
                        <i class="ri-link"></i>
                        <input type="text" id="baseUrl" placeholder="svn://..." required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <i class="ri-user-line"></i>
                        <input type="text" id="username" placeholder="SVN 账号" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="password" placeholder="SVN 密码" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="ri-search-line"></i> 连接并浏览
                </button>
            </form>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航条（面包屑） -->
            <header class="top-bar">
                <div class="breadcrumb" id="breadcrumb">
                    <span class="path-item empty">请输入 SVN 地址并连接</span>
                </div>
            </header>

            <!-- 文件列表展示区 -->
            <div class="file-view">
                <!-- 加载状态 -->
                <div id="loading" class="state-container hidden">
                    <div class="spinner"></div>
                    <p>正在获取数据...</p>
                </div>

                <!-- 错误状态 -->
                <div id="error-message" class="state-container error hidden">
                    <i class="ri-error-warning-line"></i>
                    <p class="text"></p>
                </div>

                <!-- 列表展示 -->
                <div class="table-container hidden" id="table-container">
                    <table class="file-table">
                        <thead>
                            <tr>
                                <th class="col-name">名称</th>
                                <th class="col-size">大小</th>
                                <th class="col-rev">版本</th>
                                <th class="col-author">作者</th>
                                <th class="col-date">修改时间</th>
                            </tr>
                        </thead>
                        <tbody id="file-list">
                            <!-- 动态插入行 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 纯文本文件视图 -->
                <div id="file-content" class="content-container hidden">
                    <div class="content-header">
                        <button id="btn-back-list" class="btn-secondary">
                            <i class="ri-arrow-left-line"></i> 返回列表
                        </button>
                        <div class="content-title">
                            <i class="ri-file-text-line"></i>
                            <span id="content-filename" class="content-filename">filename.txt</span>
                        </div>
                        <div style="flex: 1"></div>
                    </div>
                    <div class="content-body">
                        <pre><code id="content-text"></code></pre>
                    </div>
                </div>
                
                <!-- 初始状态 -->
                <div id="init-state" class="state-container init">
                    <i class="ri-folder-open-line outline-icon"></i>
                    <p>在左侧输入信息后开始浏览</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 引用 JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
